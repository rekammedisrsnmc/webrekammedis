<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Rekap Scan | Medical Record</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="icon" href="logorekammedis.ico">

<style>
:root{
  --green:#16a34a;
  --bg:#ffffff;
  --line:#e5e7eb;
}
*{box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{margin:0;background:var(--bg)}
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#16a34a,#15803d);
  color:#fff;
  padding:25px 20px;
}
.brand{text-align:center;margin-bottom:40px}
.brand i{font-size:42px;margin-bottom:10px}
.menu a{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;margin-bottom:14px;
  color:#fff;text-decoration:none;border-radius:14px;
}
.menu a:hover,.menu a.active{
  background:rgba(255,255,255,.2);
}

/* CONTENT */
.content{flex:1;padding:30px}
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.header h1{color:#166534}

/* BUTTON */
button.primary{
  background:var(--green);
  color:#fff;border:none;padding:10px 18px;
  border-radius:10px;cursor:pointer
}

/* TABLE */
.table-wrapper{overflow:auto}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border:1px solid var(--line);
  padding:10px;
  text-align:center;
}
th{background:var(--green);color:#fff}

input{
  padding:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* CARD */
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;margin-top:20px
}
.box{
  background:#f0fdf4;
  padding:20px;
  border-radius:15px;
  text-align:center;
}
.box h2{color:#065f46}

/* CHART */
.chart-box{
  margin-top:25px;
  background:#fff;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <i class="fas fa-notes-medical"></i>
    <h2>ADMIN MR</h2>
  </div>

  <nav class="menu">
     <a href="admin_index.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a class="active"><i class="fas fa-file-medical"></i> Regulasi</a>
    <a href="admin_kunjungan.html"><i class="fas fa-chart-simple"></i> Kunjungan Pasien</a>
    <a href="admin_pemusnahan.html"><i class="fas fa-trash"></i> Pemusnahan</a>
    <a href="admin_imut.html"><i class="fas fa-trash"></i> IMUT</a>
    <a href="javascript:void(0)" class="menu-toggle" onclick="toggleImut()">
        <i class="fas fa-chart-line"></i>
        <span>Rekapitulasi Scan</span>
        <i class="fas fa-chevron-down arrow" id="imutArrow"></i>
      </a>
  </nav>
</aside>

<!-- CONTENT -->
<main class="content">

<div class="header">
  <h1>Rekapitulasi Scan</h1>
  <button class="primary" onclick="logout()">Logout</button>
</div>

<!-- ACTION -->
<button class="primary" onclick="tambahBaris()">
  <i class="fas fa-plus"></i> Tambah Data
</button>

<br><br>

<!-- TABLE -->
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<br>

<button class="primary" onclick="simpan()">
  💾 Simpan ke Google Sheets
</button>

<!-- SUMMARY -->
<div class="summary">
  <div class="box"><p>Total Scan</p><h2 id="total">0</h2></div>
  <div class="box"><p>Rata-rata</p><h2 id="avg">0</h2></div>
</div>

<!-- CHART -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</main>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycby5gOMpu6TB8ggex5TNkyz1wRP38SoGJbp4ZRE1dwKVzEM6j4_CxBYi7wa_O5hQNx1C/exec";

let data=[];
let chart;

// tambah baris
function tambahBaris(){
  data.push({tanggal:"",jumlah:0});
  render();
}

// hapus
function hapus(i){
  data.splice(i,1);
  render();
}

// render tabel
function render(){
  const body=document.getElementById("body");
  body.innerHTML="";

  data.forEach((d,i)=>{
    body.innerHTML+=`
    <tr>
      <td><input type="date" value="${d.tanggal}" onchange="update(${i},'tanggal',this.value)"></td>
      <td><input type="number" value="${d.jumlah}" onchange="update(${i},'jumlah',this.value)"></td>
      <td><button onclick="hapus(${i})">Hapus</button></td>
    </tr>`;
  });

  updateSummary();
  renderChart();
}

// update data
function update(i,key,val){
  if(key==="jumlah") val=parseInt(val)||0;
  data[i][key]=val;
  updateSummary();
  renderChart();
}

// summary
function updateSummary(){
  let total=data.reduce((s,d)=>s+(d.jumlah||0),0);
  let avg=data.length?Math.round(total/data.length):0;

  document.getElementById("total").innerText=total;
  document.getElementById("avg").innerText=avg;
}

// chart
function renderChart(){
  let labels=data.map(d=>d.tanggal);
  let values=data.map(d=>d.jumlah);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Jumlah Scan",
        data:values
      }]
    }
  });
}

// load dari sheets
function loadData(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"get"})
  })
  .then(res=>res.json())
  .then(res=>{
    data=res;
    render();
  });
}

// simpan
function simpan(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"save",items:data})
  })
  .then(()=>{
    alert("✅ Data tersimpan");
    loadData();
  });
}

// init
window.onload=loadData;

function logout(){
  sessionStorage.removeItem("adminLogin");
  location.href="admin_index.html";
}
</script>

</body>
</html>
