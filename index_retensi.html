<!DOCTYPE html>
<html lang="id">

    <style>

        .loading {

<body>

<div id="app"></div>
<div id="toast" class="toast-message"></div>
<div id="loadingIndicator" style="display:none;" class="loading">⏳ Memuat data...</div>

<!-- MODAL EDIT -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>✏️ Edit Data Pasien</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="input-group">
                    <label class="required">No. Rekam Medis (RM)</label>
                    <input type="text" id="edit_noRm" placeholder="Contoh: RM-2409-001">
                </div>
                <div class="input-group">
                    <label class="required">Nama Lengkap Pasien</label>
                    <input type="text" id="edit_namaPasien" placeholder="Nama lengkap">
                </div>
                <div class="input-group full-width">
                    <label class="required">Diagnosa Akhir</label>
                    <input type="text" id="edit_diagnosaAkhir" placeholder="Diagnosa utama">
                </div>
                <div class="input-group full-width">
                    <label>Alamat Lengkap</label>
                    <textarea id="edit_alamat" rows="2" placeholder="Jalan, RT/RW, Kelurahan, Kecamatan"></textarea>
                </div>
                <div class="input-group">
                    <label class="required">Kunjungan Terakhir</label>
                    <input type="text" id="edit_kunjunganTerakhir" placeholder="contoh: 20 Maret 2026">
                </div>
                <div class="input-group">
                    <label>Keterangan Tambahan</label>
                    <input type="text" id="edit_keterangan" placeholder="Alasan inaktif / pindah">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-batal" id="modalBatalBtn">Batal</button>
            <button class="btn btn-simpan" id="modalSimpanBtn">Simpan Perubahan</button>
        </div>
    </div>
</div>

<script>
    // ======================= KONFIGURASI =======================
    // GANTI URL INI DENGAN URL APPS SCRIPT ANDA SETELAH DEPLOY!
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxW7iO29kIWkpasW9BLD7IJQhDCOd6yzl8xVsFIC03wGUxCLkfmmmWxsTOYfyrqdYqf/exec";
    
    const VALID_USERS = [
        { username: "admin", password: "admin123", fullName: "Administrator", role: "Supervisor" },
        { username: "petugas", password: "scan123", fullName: "Petugas Scan", role: "Petugas Rekam Medis" },
        { username: "dokter", password: "dokter123", fullName: "dr. Andini", role: "Dokter" },
        { username: "sakinah", password: "123", fullName: "Sakinah", role: "Petugas Arsip" }
    ];
    
    let currentUser = null;
    let pasienData = [];
    let editModeId = null;
    let currentFilterStart = "";
    let currentFilterEnd = "";
    
    let appContainer;
    let toastEl;
    let editModal;
    let loadingDiv;
    
    function showLoading(show) {
        if (loadingDiv) loadingDiv.style.display = show ? "flex" : "none";
    }
    
    function showToast(msg, isError = false) {
        if (!toastEl) return;
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        toastEl.style.backgroundColor = isError ? "#b3413be6" : "#1f2c38e6";
        setTimeout(() => toastEl.classList.remove('show'), 2500);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ======================= APPS SCRIPT API =======================
    async function callAppsScript(action, data = {}) {
        try {
            showLoading(true);
            const payload = { action, ...data };
            
            // Coba dengan mode no-cors untuk menghindari CORS
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ data: JSON.stringify(payload) })
            });
            
            showLoading(false);
            
            // Karena mode no-cors tidak bisa baca response, kita asumsikan sukses
            // Tapi perlu penanganan khusus
            return { success: true, data: [] };
        } catch (error) {
            showLoading(false);
            console.error("Apps Script Error:", error);
            return { success: false, error: error.message };
        }
    }
    
    // Load data dari Apps Script dengan fallback ke localStorage
    async function loadDataFromServer() {
        try {
            // Coba fetch langsung dengan JSONP style
            const response = await fetch(APPS_SCRIPT_URL + "?action=getAll", {
                method: 'GET',
                mode: 'cors'
            });
            
            if (response.ok) {
                const result = await response.json();
                if (result.success && result.data) {
                    pasienData = result.data;
                    localStorage.setItem('pasien_inaktif_data', JSON.stringify(pasienData));
                    return true;
                }
            }
            throw new Error("Gagal fetch");
        } catch (error) {
            console.warn("Gagal konek ke server, pakai localStorage:", error);
            // Fallback ke localStorage
            const stored = localStorage.getItem('pasien_inaktif_data');
            if (stored) {
                try {
                    pasienData = JSON.parse(stored);
                } catch(e) { pasienData = []; }
            } else {
                pasienData = [];
            }
            showToast("⚠️ Menggunakan data lokal (koneksi ke server gagal)", true);
            return false;
        }
    }
    
    // Simpan data ke server via fetch
    async function saveToServer(record, isUpdate = false) {
        try {
            const action = isUpdate ? "update" : "save";
            const formData = new URLSearchParams();
            formData.append('data', JSON.stringify({ action, record }));
            
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            
            // Karena no-cors, kita asumsikan sukses dan refresh data
            await loadDataFromServer();
            return true;
        } catch (error) {
            console.error("Save error:", error);
            showToast("Gagal menyimpan ke server: " + error.message, true);
            return false;
        }
    }
    
    // Hapus data dari server
    async function deleteFromServer(id) {
        try {
            const formData = new URLSearchParams();
            formData.append('data', JSON.stringify({ action: "delete", id }));
            
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            
            await loadDataFromServer();
            return true;
        } catch (error) {
            console.error("Delete error:", error);
            showToast("Gagal menghapus dari server: " + error.message, true);
            return false;
        }
    }
    
    // ======================= RENDER DASHBOARD =======================
    function renderDashboard() {
        if (!currentUser) {
            renderLogin();
            return;
        }
        
        const today = new Date().toISOString().split('T')[0];
        if (!currentFilterStart) currentFilterStart = today;
        if (!currentFilterEnd) currentFilterEnd = today;
        
        let filtered = pasienData.filter(item => {
            if (!item.tglInput) return true;
            if (currentFilterStart && item.tglInput < currentFilterStart) return false;
            if (currentFilterEnd && item.tglInput > currentFilterEnd) return false;
            return true;
        });
        
        filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
        
        const formHtml = `
            <div class="dashboard">
                <div class="form-card">
                    <div class="form-header">
                        <h1>📦 Arsip Berkas Pasien INAKTIF</h1>
                        <div style="display: flex; gap: 10px;">
                            <span class="sync-status">☁️ Tersimpan di Google Spreadsheet</span>
                            <button class="logout-btn" id="logoutBtn">🚪 Logout (${currentUser.fullName})</button>
                        </div>
                    </div>
                    <div class="scan-identity">
                        <div class="petugas-label">🧑‍⚕️ Petugas Scan / Verifikator</div>
                        <div class="petugas-name">${currentUser.fullName} (${currentUser.role})</div>
                    </div>
                    <form id="pasienForm">
                        <div class="form-grid">
                            <div class="input-group">
                                <label class="required">📇 No. Rekam Medis (RM)</label>
                                <input type="text" id="noRm" placeholder="Contoh: RM-2409-001" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label class="required">👤 Nama Lengkap Pasien</label>
                                <input type="text" id="namaPasien" placeholder="Nama lengkap">
                            </div>
                            <div class="input-group full-width">
                                <label class="required">🩺 Diagnosa Akhir</label>
                                <input type="text" id="diagnosaAkhir" placeholder="Diagnosa utama">
                            </div>
                            <div class="input-group full-width">
                                <label>🏠 Alamat Lengkap</label>
                                <textarea id="alamat" rows="2" placeholder="Jalan, RT/RW, Kelurahan, Kecamatan"></textarea>
                            </div>
                            <div class="input-group">
                                <label class="required">📅 Kunjungan Terakhir</label>
                                <input type="text" id="kunjunganTerakhir" placeholder="contoh: 20 Maret 2026">
                            </div>
                            <div class="input-group">
                                <label>📝 Keterangan Tambahan</label>
                                <input type="text" id="keterangan" placeholder="Alasan inaktif / pindah">
                            </div>
                        </div>
                        <div class="info-autotime">⏱️ Tanggal input akan dicatat otomatis (hari ini) dan tersimpan ke Google Spreadsheet</div>
                        <div class="action-buttons">
                            <button type="submit" class="btn btn-primary" id="submitBtn">➕ Simpan Data</button>
                        </div>
                    </form>
                </div>
                
                <div class="filter-bar">
                    <div class="filter-group">
                        <label>📅 Filter Tanggal Input (mulai)</label>
                        <input type="date" id="filterStart" value="${currentFilterStart}">
                    </div>
                    <div class="filter-group">
                        <label>sampai tanggal</label>
                        <input type="date" id="filterEnd" value="${currentFilterEnd}">
                    </div>
                    <button class="btn-filter" id="applyFilter">🔍 Terapkan Filter</button>
                    <button class="btn-filter reset-filter" id="resetFilter">⟳ Reset (Semua Data)</button>
                    <button class="btn-filter reset-filter" id="refreshDataBtn" style="background:#4caf50;">🔄 Refresh Data</button>
                </div>
                
                <div class="table-container">
                    <div class="table-header">
                        <h2>📋 Data Pasien Inaktif <span class="badge-count">${filtered.length}</span></h2>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th class="no-col">NO</th>
                                    <th>No. RM</th>
                                    <th>NAMA</th>
                                    <th>Diagnosa Akhir</th>
                                    <th>Alamat</th>
                                    <th>Kunjungan Terakhir</th>
                                    <th>Keterangan</th>
                                    <th>Petugas Scan</th>
                                    <th>Tgl Input</th>
                                    <th>AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                ${filtered.length === 0 ? `
                                    <tr class="empty-row">
                                        <td colspan="10" style="text-align:center">📭 Belum ada data. Silakan isi form di atas.</td>
                                    </tr>
                                ` : filtered.map((item, index) => `
                                    <tr>
                                        <td class="no-col">${index + 1}</td>
                                        <td>${escapeHtml(item.noRm)}</td>
                                        <td><strong>${escapeHtml(item.namaPasien)}</strong></td>
                                        <td>${escapeHtml(item.diagnosaAkhir)}</td>
                                        <td>${escapeHtml(item.alamat) || '-'}</td>
                                        <td>${escapeHtml(item.kunjunganTerakhir)}</td>
                                        <td>${escapeHtml(item.keterangan) || '-'}</td>
                                        <td>${escapeHtml(item.petugasScan)}</td>
                                        <td>${item.tglInput || '-'}</td>
                                        <td>
                                            <div class="dropdown" data-id="${item.id}">
                                                <button class="btn-aksi" data-id="${item.id}">▼ Aksi</button>
                                                <div class="dropdown-content" data-dropdown="${item.id}">
                                                    <button class="edit-option" data-id="${item.id}">✏️ Edit</button>
                                                    <button class="delete-option" data-id="${item.id}">🗑️ Hapus</button>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        
        appContainer.innerHTML = formHtml;
        
        // Attach event listeners
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('pasienForm')?.addEventListener('submit', handleSubmitForm);
        document.getElementById('applyFilter')?.addEventListener('click', applyFilter);
        document.getElementById('resetFilter')?.addEventListener('click', resetFilter);
        document.getElementById('refreshDataBtn')?.addEventListener('click', refreshData);
        
        // Dropdown klik
        document.querySelectorAll('.btn-aksi').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const dropdown = document.querySelector(`.dropdown-content[data-dropdown="${id}"]`);
                document.querySelectorAll('.dropdown-content').forEach(d => {
                    if (d !== dropdown) d.classList.remove('show');
                });
                dropdown.classList.toggle('show');
            });
        });
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-content').forEach(drop => {
                    drop.classList.remove('show');
                });
            }
        });
        
        // Edit
        document.querySelectorAll('.edit-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                openEditModal(id);
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            });
        });
        
        // Hapus
        document.querySelectorAll('.delete-option').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
                const item = pasienData.find(i => i.id == id);
                if (item && confirm(`⚠️ Yakin ingin menghapus data pasien "${item.namaPasien}"?`)) {
                    const success = await deleteFromServer(id);
                    if (success) {
                        await refreshData();
                        showToast(`🗑️ Data ${item.namaPasien} dihapus dari server`);
                    }
                }
            });
        });
    }
    
    async function handleSubmitForm(e) {
        e.preventDefault();
        
        const newData = {
            noRm: document.getElementById('noRm').value.trim(),
            namaPasien: document.getElementById('namaPasien').value.trim(),
            diagnosaAkhir: document.getElementById('diagnosaAkhir').value.trim(),
            alamat: document.getElementById('alamat').value.trim(),
            kunjunganTerakhir: document.getElementById('kunjunganTerakhir').value.trim(),
            keterangan: document.getElementById('keterangan').value.trim(),
            petugasScan: `${currentUser.fullName} (${currentUser.role})`
        };
        
        if (!newData.noRm || !newData.namaPasien || !newData.diagnosaAkhir || !newData.kunjunganTerakhir) {
            showToast("❌ Lengkapi field yang bertanda *", true);
            return;
        }
        
        const success = await saveToServer(newData, false);
        if (success) {
            showToast(`✅ Data ${newData.namaPasien} berhasil disimpan ke server`);
            document.getElementById('pasienForm').reset();
            await refreshData();
        }
    }
    
    function openEditModal(id) {
        const item = pasienData.find(i => i.id == id);
        if (!item) return;
        editModeId = id;
        document.getElementById('edit_noRm').value = item.noRm || '';
        document.getElementById('edit_namaPasien').value = item.namaPasien || '';
        document.getElementById('edit_diagnosaAkhir').value = item.diagnosaAkhir || '';
        document.getElementById('edit_alamat').value = item.alamat || '';
        document.getElementById('edit_kunjunganTerakhir').value = item.kunjunganTerakhir || '';
        document.getElementById('edit_keterangan').value = item.keterangan || '';
        editModal.classList.add('show');
    }
    
    function closeEditModal() {
        editModal.classList.remove('show');
        editModeId = null;
    }
    
    async function saveEditFromModal() {
        if (!editModeId) return;
        
        const updatedData = {
            id: editModeId,
            noRm: document.getElementById('edit_noRm').value.trim(),
            namaPasien: document.getElementById('edit_namaPasien').value.trim(),
            diagnosaAkhir: document.getElementById('edit_diagnosaAkhir').value.trim(),
            alamat: document.getElementById('edit_alamat').value.trim(),
            kunjunganTerakhir: document.getElementById('edit_kunjunganTerakhir').value.trim(),
            keterangan: document.getElementById('edit_keterangan').value.trim(),
            petugasScan: `${currentUser.fullName} (${currentUser.role})`,
            tglInput: pasienData.find(i => i.id == editModeId)?.tglInput || new Date().toISOString().split('T')[0]
        };
        
        if (!updatedData.noRm || !updatedData.namaPasien || !updatedData.diagnosaAkhir || !updatedData.kunjunganTerakhir) {
            showToast("❌ Lengkapi field yang bertanda *", true);
            return;
        }
        
        const success = await saveToServer(updatedData, true);
        if (success) {
            showToast("✅ Data berhasil diupdate di server");
            closeEditModal();
            await refreshData();
        }
    }
    
    function applyFilter() {
        currentFilterStart = document.getElementById('filterStart').value;
        currentFilterEnd = document.getElementById('filterEnd').value;
        renderDashboard();
    }
    
    function resetFilter() {
        currentFilterStart = "";
        currentFilterEnd = "";
        renderDashboard();
    }
    
    async function refreshData() {
        await loadDataFromServer();
        renderDashboard();
        showToast("🔄 Data berhasil di-refresh dari server");
    }
    
    // ======================= LOGIN =======================
    function renderLogin() {
        appContainer.innerHTML = `
            <div class="login-overlay">
                <div class="login-card">
                    <h2>🔐 Login Arsip Pasien Inaktif</h2>
                    <p style="text-align:center; font-size:12px; color:#2c7da0; margin-bottom:15px;">☁️ Tersimpan di Google Spreadsheet</p>
                    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button id="loginBtn">Masuk</button>
                    <div id="loginError" class="login-error"></div>
                    <div style="margin-top: 16px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 12px;">
                        <strong>Akun Demo:</strong><br>
                        admin / admin123 &nbsp;|&nbsp; petugas / scan123<br>
                        sakinah / 123
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const user = VALID_USERS.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = { fullName: user.fullName, role: user.role, username: user.username };
                await loadDataFromServer();
                renderDashboard();
            } else {
                document.getElementById('loginError').textContent = "❌ Username atau password salah!";
            }
        });
        
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    }
    
    function logout() {
        currentUser = null;
        renderLogin();
    }
    
    // ======================= INIT =======================
    window.onload = () => {
        appContainer = document.getElementById('app');
        toastEl = document.getElementById('toast');
        loadingDiv = document.getElementById('loadingIndicator');
        editModal = document.getElementById('editModal');
        
        const closeBtn = document.getElementById('closeModalBtn');
        const batalBtn = document.getElementById('modalBatalBtn');
        const simpanBtn = document.getElementById('modalSimpanBtn');
        
        if (closeBtn) closeBtn.addEventListener('click', closeEditModal);
        if (batalBtn) batalBtn.addEventListener('click', closeEditModal);
        if (simpanBtn) simpanBtn.addEventListener('click', saveEditFromModal);
        
        if (editModal) {
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) closeEditModal();
            });
        }
        
        renderLogin();
    };
</script>
</body>
</html>
