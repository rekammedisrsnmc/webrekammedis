<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logorekammedis.ico">
<title>Rekapitulasi Scan | Medical Record</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --green:#2fa36b;
  --green-dark:#1f7f53;
  --bg:#eef5f2;
  --card:#ffffff;
  --shadow:0 12px 30px rgba(0,0,0,.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}

/* HEADER */
header{background:linear-gradient(135deg,#ffffff,#e9f7f0);padding:15px 20px;box-shadow:var(--shadow)}
.logo img{width:300px;height:70px}

.admin-btn{
  margin-left:auto;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff;padding:8px 18px;border-radius:30px;font-size:12px;
  text-decoration:none;display:flex;align-items:center;gap:8px;
  box-shadow:var(--shadow);
}
.header-bar{display:flex;align-items:center;justify-content:space-between}

/* NAV */
nav ul{
  list-style:none;display:flex;justify-content:center;gap:6px;
  padding:10px;margin-top:15px;background:#fff;border-radius:50px;
  box-shadow:var(--shadow)
}
nav ul li a{
  text-decoration:none;color:#444;font-weight:600;font-size:14px;
  border-radius:50px;padding:6px 16px;display:flex;gap:6px;
}
nav ul li a:hover{
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff
}

/* MAIN */
main{flex:1;padding:30px 20px}
.content{
  max-width:1300px;margin:auto;background:var(--card);
  padding:30px;border-radius:22px;box-shadow:var(--shadow)
}

/* GRID */
.layout{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:25px;
}
@media(max-width:1000px){.layout{grid-template-columns:1fr}}

/* CARD */
.card{
  background:#fff;padding:22px;border-radius:20px;
  margin-bottom:25px;box-shadow:var(--shadow)
}

/* SUMMARY */
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.box{
  background:#f0fdf4;padding:20px;border-radius:15px;text-align:center
}
.box h2{color:#065f46}

/* TABLE */
.table-responsive{overflow-x:auto}
table{
  width:100%;border-collapse:collapse
}
th{
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff;padding:10px
}
td{padding:10px;text-align:center;border-bottom:1px solid #eee}

/* SIDEBAR */
.sidebar{
  background:linear-gradient(180deg,#ffffff,#f0fdf4);
  border-radius:20px;padding:22px;box-shadow:var(--shadow)
}
.sidebar h3{color:var(--green);margin-bottom:15px}
.sidebar ul{list-style:none}
.sidebar ul li a{
  display:flex;gap:10px;padding:12px;margin-bottom:10px;
  border-radius:14px;text-decoration:none;color:#333;
  background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.08)
}
.sidebar ul li a:hover{
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff
}

/* CHART */
.chart-box{height:400px}

/* FOOTER */
footer{background:#fff;padding:20px;text-align:center}
</style>
</head>

<body>

<header>
  <div class="header-bar">
    <div class="logo"><img src="logopanjang.png"></div>
    <a href="admin_index.html" class="admin-btn">
      <i class="fas fa-user-shield"></i> Admin
    </a>
  </div>
</header>

<main>
<div class="content">

<h2 style="color:var(--green)">📊 Rekapitulasi Hasil Scan</h2>

<div class="layout">

<!-- MAIN -->
<div>

<!-- SUMMARY -->
<div class="card">
  <div class="summary">
    <div class="box">
      <p>Total Data</p>
      <h2 id="totalData">0</h2>
    </div>
    <div class="box">
      <p>Total Scan</p>
      <h2 id="totalScan">0</h2>
    </div>
    <div class="box">
      <p>Rata-rata</p>
      <h2 id="avgScan">0</h2>
    </div>
  </div>
</div>

<!-- TABLE -->
<div class="card">
  <h3>📋 Data Scan</h3>
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody id="tabelData"></tbody>
    </table>
  </div>
</div>

<!-- CHART -->
<div class="card">
  <h3>📈 Grafik Scan</h3>
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <h3><i class="fas fa-list"></i> Menu</h3>
  <ul>
    <li><a href="imut.html"><i class="fas fa-chart-line"></i> Indikator Mutu</a></li>
    <li><a href="indikatorbor.html"><i class="fas fa-bed"></i> BOR LOS TOI</a></li>
    <li><a href="#"><i class="fas fa-barcode"></i> Rekap Scan</a></li>
  </ul>
</aside>

</div>
</div>
</main>

<footer>
<strong>MEDICAL RECORD</strong>
<div>© 2026 RSU An'Nimah • Unit Rekam Medis</div>
</footer>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwMeifD27srfCcGsQd31MupVUDWdH1EowH4NksI_xc/dev";
let chart;

fetch(API_URL,{
  method:"POST",
  body:JSON.stringify({action:"get"})
})
.then(res=>res.json())
.then(data=>{
  let total=0;
  let html="";
  let labels=[],values=[];

  data.forEach(d=>{
    total+=Number(d.jumlah)||0;
    html+=`<tr><td>${d.tanggal}</td><td>${d.jumlah}</td></tr>`;
    labels.push(d.tanggal);
    values.push(d.jumlah);
  });

  tabelData.innerHTML=html;

  let totalData=data.length;
  let avg= totalData?Math.round(total/totalData):0;

  document.getElementById("totalData").innerText=totalData;
  document.getElementById("totalScan").innerText=total;
  document.getElementById("avgScan").innerText=avg;

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Jumlah Scan",
        data:values,
        backgroundColor:"rgba(47,163,107,0.6)"
      }]
    }
  });
});
</script>

</body>
</html>
